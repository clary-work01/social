name : Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write


jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: google-github-actions/release-please-action@v4
        with:
          release-type: go
          token: ${{ secrets.MY_RELEASE_PLEASE_TOKEN }}